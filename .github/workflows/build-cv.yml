name: Build and Release CV

on:
  push:
    tags:
      - 'v*' # Triggers only with tags like v1.0, v2026.1, etc.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 📄 Generate PDFs (ES + EN)
        run: node generate.js

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            David_Cooper_CV.pdf
            David_Cooper_CV_EN.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}